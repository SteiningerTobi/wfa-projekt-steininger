<section class="account-page big-marg-top">
  @if (isLoggedIn()) {
    <bs-me></bs-me>
  } @else {
    <div class="rounded-3xl border border-gray-200 bg-white p-8 shadow-sm md:p-12">
      <div class="text-center">
        <p class="text-xs font-black uppercase tracking-[0.18em] text-[var(--teal)]">
          Account
        </p>

        <h1 class="mt-3 text-4xl font-black leading-none tracking-tight text-[var(--prussian)] md:text-6xl">
          Willkommen bei fitns
        </h1>

        <p class="mt-5 text-base leading-7 text-gray-600 md:text-lg">
          Melde dich an, um Kurstermine zu buchen und deine Buchungen zu verwalten.
          Falls du neu bist, kannst du dir direkt einen neuen Account erstellen.
        </p>
      </div>

      <div class="mt-5 flex flex-col">
        <div class="mx-auto mt-0 flex max-w-2xl flex-col items-center gap-8 text-center">
          <span class="mt-2 login-btn-container">
            <h2 class="small-h2">Du hast bereits einen Account?</h2>
            <a class="cta-btn" routerLink="/login">Anmelden</a>
          </span>
        </div>

        <div class="mx-auto mt-0 flex max-w-2xl flex-col items-center gap-8 text-center">
          <span class="mt-10 login-btn-container">
            <h2 class="small-h2">Du hast noch keinen Account?</h2>
            <a class="cta-btn" (click)="toBeImplemented()">Neu Registrieren</a>
          </span>
        </div>
      </div>
    </div>
  }
</section>
